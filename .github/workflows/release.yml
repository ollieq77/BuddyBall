name: Attach BuddyBall build to release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: windows-latest

    steps:
      - name: Checkout BuddyBall repo
        uses: actions/checkout@v4

      - name: Checkout BuddyBall source
        uses: actions/checkout@v4
        with:
          repository: ollieq77/BuddyBall-Project-Files
          path: buddyball-source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: buddyball-source/package-lock.json

      - name: Install dependencies
        working-directory: buddyball-source
        run: npm ci

      - name: Build Electron app
        working-directory: buddyball-source
        run: npm run build

      - name: Create portable ZIP
        working-directory: buddyball-source/dist
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "win-unpacked\*" `
            -DestinationPath "BuddyBall-Portable.zip"

      - name: Create Buddies ZIP
        working-directory: buddyball-source/dist
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "public\*" `
            -DestinationPath "BuddyBall-Buddies.zip"

      - name: Upload ZIPs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            buddyball-source/dist/BuddyBall-Portable.zip
            buddyball-source/dist/BuddyBall-Buddies.zip